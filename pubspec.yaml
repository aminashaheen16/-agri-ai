name: agri_ai
description: "A smart farm management system with AI and IoT integration."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  supabase_flutter: ^1.10.25
  firebase_core: ^3.10.0
  firebase_messaging: ^15.2.10
  http: ^1.1.2
  image_picker: ^1.0.7
  fl_chart: ^0.66.0
  lottie: ^3.0.0
  google_fonts: ^6.1.0
  intl: 0.20.2
  geolocator: ^10.1.0
  weather: ^3.1.0
  flutter_local_notifications: ^16.3.0
  flutter_blue_plus: ^2.3.2
  cached_network_image: ^3.3.1
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - .env